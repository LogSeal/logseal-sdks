[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "logseal"
version = "0.1.0"
description = "Official Python SDK for LogSeal — Audit logging for B2B SaaS"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "LogSeal", email = "support@logseal.io" }]
keywords = ["audit", "logging", "audit-log", "compliance", "soc2", "b2b", "saas"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.24.0",
]

[project.urls]
Homepage = "https://github.com/LogSeal/logseal-sdks"
Repository = "https://github.com/LogSeal/logseal-sdks/tree/main/packages/python"
Issues = "https://github.com/LogSeal/logseal-sdks/issues"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-httpx>=0.30",
    "mypy>=1.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["logseal"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.9"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
