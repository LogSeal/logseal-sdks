name: Publish PHP SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: packages/php

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install

      - name: Set version
        run: |
          jq ".version = \"${{ inputs.version }}\"" composer.json > tmp.json && mv tmp.json composer.json
          sed -i "s/private const VERSION = .*/private const VERSION = '${{ inputs.version }}';/" src/LogSeal.php

      - name: Test
        run: composer test

      - name: Commit version bump
        run: |
          cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/php/composer.json packages/php/src/LogSeal.php
          git commit -m "release: logseal-php@${{ inputs.version }}"
          git push origin HEAD

      - name: Sync and tag split repo
        run: |
          cd ../..
          git subtree split --prefix=packages/php -b split-php
          git remote add php-split https://x-access-token:${{ secrets.SPLIT_REPO_TOKEN }}@github.com/LogSeal/logseal-php.git
          git push php-split split-php:main --force
          git tag "v${{ inputs.version }}" split-php
          git push php-split "v${{ inputs.version }}"
        # Packagist auto-updates via webhook when tags are pushed to logseal-php
