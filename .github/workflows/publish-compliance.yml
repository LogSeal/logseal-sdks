name: Publish Compliance CLI

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx turbo build

      - name: Test
        run: npx turbo test

      - name: Bump version
        id: version
        run: |
          cd packages/compliance
          npm version "${{ inputs.bump }}" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: npm publish --workspace packages/compliance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/compliance/package.json
          git commit -m "release: @logseal/compliance@${{ steps.version.outputs.version }}"
          git tag "compliance-v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags
