name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Node / React / Viewer ──────────────────────────────────
  node:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'node') ||
      contains(github.event.pull_request.title, 'react') ||
      contains(github.event.pull_request.title, 'viewer')
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npx turbo build
      - run: npx turbo test
      - run: npx turbo typecheck

  # ── Python ─────────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'Python')
    defaults:
      run:
        working-directory: packages/python
    strategy:
      matrix:
        python-version: ['3.10', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  # ── Go ─────────────────────────────────────────────────────
  go:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'Go')
    defaults:
      run:
        working-directory: packages/go/logseal
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test ./... -v

  # ── Java ───────────────────────────────────────────────────
  java:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'Java')
    defaults:
      run:
        working-directory: packages/java
    strategy:
      matrix:
        java-version: ['11', '17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
      - run: mvn test -B

  # ── Ruby ───────────────────────────────────────────────────
  ruby:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'Ruby')
    defaults:
      run:
        working-directory: packages/ruby
    strategy:
      matrix:
        ruby-version: ['3.1', '3.2', '3.3']
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: packages/ruby
      - run: bundle exec rspec

  # ── PHP ────────────────────────────────────────────────────
  php:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'PHP')
    defaults:
      run:
        working-directory: packages/php
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
      - run: composer install --no-interaction
      - run: composer test
