name: Publish Go SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Test
        working-directory: packages/go/logseal
        run: go test ./... -v

      - name: Sync and tag split repo
        run: |
          git subtree split --prefix=packages/go/logseal -b split-go
          git remote add go-split https://x-access-token:${{ secrets.SPLIT_REPO_TOKEN }}@github.com/LogSeal/logseal-go.git
          git push go-split split-go:main --force
          git tag "v${{ inputs.version }}" split-go
          git push go-split "v${{ inputs.version }}"
